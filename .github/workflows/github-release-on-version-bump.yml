name: Create GitHub Release on Version Bump

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build VSIX
        run: npx @vscode/vsce package

      - name: Detect version change
        id: version
        run: |
          node <<'EOF'
          const fs = require('fs');
          const cp = require('child_process');

          const before = process.env.GITHUB_EVENT_BEFORE || '';
          const nowVersion = JSON.parse(fs.readFileSync('package.json', 'utf8')).version;

          let oldVersion = '';
          try {
            if (before) {
              const oldPkg = cp.execSync(`git show ${before}:package.json`, { encoding: 'utf8' });
              oldVersion = JSON.parse(oldPkg).version || '';
            }
          } catch {
            oldVersion = '';
          }

          const changed = oldVersion !== nowVersion;
          const tag = `v${nowVersion}`;
          const out = process.env.GITHUB_OUTPUT;

          fs.appendFileSync(out, `old_version=${oldVersion}\n`);
          fs.appendFileSync(out, `new_version=${nowVersion}\n`);
          fs.appendFileSync(out, `version_changed=${String(changed)}\n`);
          fs.appendFileSync(out, `tag=${tag}\n`);

          console.log(`Old version: ${oldVersion || '(none)'}`);
          console.log(`New version: ${nowVersion}`);
          console.log(`Version changed: ${changed}`);
          console.log(`Tag: ${tag}`);
          EOF
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}

      - name: Check if tag already exists
        id: tag_check
        if: github.event_name == 'workflow_dispatch' || steps.version.outputs.version_changed == 'true'
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "El tag ${{ steps.version.outputs.tag }} ya existe. Se omite la creación de release."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Find VSIX artifact
        id: vsix
        if: (github.event_name == 'workflow_dispatch' || steps.version.outputs.version_changed == 'true') && steps.tag_check.outputs.exists != 'true'
        run: |
          VSIX_FILE=$(ls -1 *.vsix | head -n 1)
          if [ -z "$VSIX_FILE" ]; then
            echo "No se encontró VSIX generado"
            exit 1
          fi
          echo "file=$VSIX_FILE" >> "$GITHUB_OUTPUT"
          echo "VSIX: $VSIX_FILE"

      - name: Create GitHub Release
        if: (github.event_name == 'workflow_dispatch' || steps.version.outputs.version_changed == 'true') && steps.tag_check.outputs.exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: ${{ steps.vsix.outputs.file }}

      - name: Skip release info (tag already exists)
        if: (github.event_name == 'workflow_dispatch' || steps.version.outputs.version_changed == 'true') && steps.tag_check.outputs.exists == 'true'
        run: |
          echo "No se crea release: el tag ${{ steps.version.outputs.tag }} ya existe."

      - name: Skip release info
        if: github.event_name != 'workflow_dispatch' && steps.version.outputs.version_changed != 'true'
        run: |
          echo "No se crea release: package.json no cambió de versión."
          echo "Version anterior: ${{ steps.version.outputs.old_version }}"
          echo "Version actual:  ${{ steps.version.outputs.new_version }}"
