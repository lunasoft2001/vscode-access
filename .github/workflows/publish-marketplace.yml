name: Publish Extension to Marketplace

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: marketplace-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: marketplace

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile extension
        run: npm run compile

      - name: Detect version change
        id: version
        run: |
          node <<'EOF'
          const fs = require('fs');
          const cp = require('child_process');

          const before = process.env.GITHUB_EVENT_BEFORE || '';
          const nowVersion = JSON.parse(fs.readFileSync('package.json', 'utf8')).version;

          let oldVersion = '';
          try {
            if (before) {
              const oldPkg = cp.execSync(`git show ${before}:package.json`, { encoding: 'utf8' });
              oldVersion = JSON.parse(oldPkg).version || '';
            }
          } catch {
            oldVersion = '';
          }

          const changed = oldVersion !== nowVersion;
          const out = process.env.GITHUB_OUTPUT;

          fs.appendFileSync(out, `old_version=${oldVersion}\n`);
          fs.appendFileSync(out, `new_version=${nowVersion}\n`);
          fs.appendFileSync(out, `version_changed=${String(changed)}\n`);

          console.log(`Old version: ${oldVersion || '(none)'}`);
          console.log(`New version: ${nowVersion}`);
          console.log(`Version changed: ${changed}`);
          EOF
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}

      - name: Guard workflow file changes
        id: guard
        run: |
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "safe=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED_FILES="$(git diff --name-only "$BEFORE" "${{ github.sha }}")"
          echo "Archivos cambiados en el push:"
          echo "$CHANGED_FILES"

          if echo "$CHANGED_FILES" | grep -qE '^\.github/workflows/'; then
            echo "safe=false" >> "$GITHUB_OUTPUT"
            echo "Se detectaron cambios en workflows. Se bloquea publicación automática para proteger secretos."
          else
            echo "safe=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate VSCE_PAT
        if: (github.event_name == 'workflow_dispatch' || steps.version.outputs.version_changed == 'true') && steps.guard.outputs.safe == 'true'
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "::error::Falta el secret VSCE_PAT en el repositorio (Settings > Secrets and variables > Actions)."
            exit 1
          fi

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Publish to VS Marketplace
        if: (github.event_name == 'workflow_dispatch' || steps.version.outputs.version_changed == 'true') && steps.guard.outputs.safe == 'true'
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: vsce publish -p "$VSCE_PAT"

      - name: Skip publish info
        if: github.event_name != 'workflow_dispatch' && (steps.version.outputs.version_changed != 'true' || steps.guard.outputs.safe != 'true')
        run: |
          echo "No se publica: no cambió la versión o el push incluyó cambios de workflow."
          echo "Version anterior: ${{ steps.version.outputs.old_version }}"
          echo "Version actual:  ${{ steps.version.outputs.new_version }}"
          echo "Safe publish:    ${{ steps.guard.outputs.safe }}"
